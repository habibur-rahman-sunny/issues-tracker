<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>

    <!-- Daisy + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="min-h-screen bg-gray-100 p-10">
    <main class="w-9/12 lg:w-4/12 mx-auto bg-white shadow-lg pt-6 rounded-2xl">
      <section class="">
        <div class="flex flex-col justify-center items-center gap-8">
          <img class="w-3/12" src="assets/github-logo.png" alt="" />
          <div>
            <h1 class="text-2xl font-bold text-center">
              GitHub Issues Tracker
            </h1>
            <p class="font-medium text-gray-400 text-center">
              Sign in to manage your issues
            </p>
          </div>
        </div>
      </section>

      <section> 
        <!-- input Field -->
        <div class="space-y-3 w-11/12 md:w-11/12 mx-auto p-6 mb-12">
          <div class="flex flex-col">
            <label class="font-semibold mb-1" for="Username">Username</label>
            <input id="input-username"
              class="font-semibold p-2 rounded-lg border-gray-300"
              type="text"
              placeholder="Enter your username"
            />
            <p class="text-violet-700">Default: admin</p>
          </div>
          <div class="flex flex-col">
            <label class="font-semibold mb-1" for="Password">Password</label>
            <input id="input-password"
              class="font-semibold p-2 rounded-lg border-gray-300"
              type="text"
              placeholder="Enter your password"
            />
            <p class="text-violet-700">Default: admin123</p>
          </div>
          <div>
            <!-- Button -->
            <button onclick="signIn()" id="sign-in-btn" class="btn btn-primary w-full font-bold text-white">
              Sign In
            </button>
          </div>
          <div class="flex items-center gap-5">
            <hr class="text-gray-300 w-5/12 font-bold" />
            <p>OR</p>
            <hr class="text-gray-300 w-5/12 font-bold" />
          </div>
          <div>
            <p class="text-gray-400 text-center mb-1">Demo Credentials</p>
            <div class="bg-gray-100 rounded-sm text-center p-3">
              <h1><span class="font-bold">Username:</span> admin</h1>
              <h1><span class="font-bold">Password:</span> admin123</h1>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>

  <link rel="stylesheet" href="style/style.css" />
  <link rel="stylesheet" href="home.html" />
  <script src="js/login.js"></script>
</html>
